<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .card{
         border: 2px solid black;
         padding: 10px;
         width: 280px;
         border-radius: 5px;
         align-items: center;
         margin: 10px;
         

    }
    .card-img{
        display: block;
        width: 240px;
        height: 200px;

        border-radius: 5px;
        border: 2px solid black;
        padding: 4px;
        margin: auto;
    }

    .info{
        margin: auto;
         width: 235px;
        height: fit-content;
        margin-top: 5px;
        border-radius: 4px;
        padding: 8px;
        border: 2px solid black;
    }
.parent{
    display: flex;
    flex-wrap: wrap;
    
     
}

</style>
<body>

    <h1>
        This is Jungle Safari
    </h1>

    <div class="parent">

        <div class="card">

        <div class="child">
            <img class="card-img" src="download (1).jpg" alt="">

        </div>
        <div class="info">
            <p>This is panda</p>
            <p><b>very gentle Animal</b></p>
        </div>

    </div>

    <div class="card">

        <div class="child">
            <img class="card-img" src="download.jpg" alt="">

        </div>
        <div class="info">
            <p>This is Deer</p>
            <p><b>very gentle Animal</b></p>
        </div>

    </div>
    <div class="card">

        <div class="child">
            <img class="card-img" src="images (1).jpg" alt="">

        </div>
        <div class="info">
            <p>This is Meercat</p>
            <p><b>very gentle Animal</b></p>
        </div>

    </div>
    <div class="card">

        <div class="child">
            <img class="card-img" src="images.jpg" alt="">

        </div>
        <div class="info">
            <p>This is Duckling</p>
            <p><b>very gentle Animal</b></p>
        </div>

    </div>
    <div class="card">

        <div class="child">
            <img class="card-img" src="download (2).jpg" alt="">

        </div>
        <div class="info">
            <p>This is Jaguar</p>
            <p><b>very gentle Animal</b></p>
        </div>

    </div>

    </div>

    
    
</body>
</html>
